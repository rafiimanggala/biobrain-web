<!-- Floating Action Button -->
<button
  mat-fab
  class="ask-fab"
  color="primary"
  (click)="togglePanel()"
  matTooltip="Ask BioBrain"
  aria-label="Ask BioBrain"
  *ngIf="!isOpen && !aiDisabled">
  <mat-icon>psychology</mat-icon>
</button>

<!-- Chat Panel -->
<div class="chat-panel" *ngIf="isOpen && !aiDisabled">
  <div class="chat-header" [style.background]="headerColor" fxLayout="row" fxLayoutAlign="space-between center">
    <span class="chat-title" fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="8px">
      <mat-icon>psychology</mat-icon>
      <span>Ask BioBrain</span>
    </span>
    <span fxLayout="row" fxLayoutGap="4px">
      <button mat-icon-button matTooltip="Clear conversation" (click)="clearConversation()" [disabled]="messages.length === 0">
        <mat-icon>delete_outline</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Close" (click)="closePanel()">
        <mat-icon>close</mat-icon>
      </button>
    </span>
  </div>

  <div class="chat-messages" #messageList role="log" aria-live="polite">
    <div class="empty-state" *ngIf="messages.length === 0 && !isLoading">
      <mat-icon class="empty-icon">question_answer</mat-icon>
      <p>Ask any question about this topic and BioBrain will help you understand it.</p>
    </div>

    <div *ngFor="let msg of messages"
         class="message"
         [ngClass]="{'message-user': msg.role === 'user', 'message-assistant': msg.role === 'assistant'}">
      <div class="message-bubble" *ngIf="msg.role === 'user'" [style.background]="headerColor">
        {{msg.content}}
      </div>
      <div class="message-bubble markdown-body" *ngIf="msg.role === 'assistant'" [innerHTML]="msg.renderedHtml"></div>
    </div>

    <div class="message message-assistant" *ngIf="isLoading">
      <div class="message-bubble loading-bubble">
        <mat-spinner diameter="20"></mat-spinner>
        <span>Thinking...</span>
      </div>
    </div>

    <div class="error-message" *ngIf="errorMessage" role="alert">
      <mat-icon>error_outline</mat-icon>
      <span>{{errorMessage}}</span>
    </div>
  </div>

  <div class="chat-input" fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="8px">
    <mat-form-field appearance="outline" class="input-field" fxFlex>
      <input
        matInput
        [(ngModel)]="questionText"
        placeholder="Type your question..."
        (keydown)="onKeyDown($event)"
        [disabled]="isLoading"
        autocomplete="off">
    </mat-form-field>
    <button
      mat-icon-button
      color="primary"
      (click)="sendQuestion()"
      [disabled]="!questionText.trim() || isLoading"
      matTooltip="Send">
      <mat-icon>send</mat-icon>
    </button>
  </div>
</div>
