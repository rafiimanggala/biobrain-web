<div class='container full-size-no-overflow' fxLayout='column'>
  <ng-container *ngIf='data$ | async as data'>
    <div class='quiz-header' fxLayout='row' fxLayoutAlign='space-between center'>
      <span class='quiz-path'>{{data.path}}</span>
    </div>

    <div class='content-container' fxLayout='column' fxLayoutAlign='center center' fxFlex='1 1 100'>
      <app-question-content
        [question]='data.question'
        [questionIndex]='data.questionIndex'
        [totalQuestions]='data.totalQuestions'
        [nodeHeader]='data.nodeHeader'
        [hintsEnabled]='data.hintsEnabled'
        [isCustomQuiz]='data.isCustomQuiz'
        (answerValueChange)='onAnswerValueChange(data.quizResult, data.question, $event)'
        class='quiz-content'>
      </app-question-content>
    </div>
  </ng-container>
</div>

<app-loader></app-loader>
