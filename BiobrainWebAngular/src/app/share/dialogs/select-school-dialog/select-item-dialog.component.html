<h2 class="dialog-header" mat-dialog-title>{{strings.select + ' ' + dialogData.entityName | titlecase}}</h2>

<mat-dialog-content>
  <mat-action-list>
    <button *ngFor="let item of dialogData.items" mat-list-item (click)="onSubmit(item)">{{item.name}}</button>
  </mat-action-list>

</mat-dialog-content>

<div mat-dialog-actions fxLayout="row" fxLayoutGap="8px" align="end">
  <div class="flex-separator"></div>

  <button mat-stroked-button class="auto-bordered-form-button" color="accent" (click)="onClose()" type="button">
    {{strings.cancel | uppercase}}
  </button>
</div>
