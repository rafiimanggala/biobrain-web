<h1 mat-dialog-title class="rating-title">{{ dialogData.title }}</h1>

<mat-dialog-content fxLayout="column" fxLayoutAlign="center center">
  <div class="stars-container">
    <mat-icon
      *ngFor="let star of stars"
      class="star-icon"
      [class.active]="star <= (hoveredRating > 0 ? hoveredRating : rating)"
      (mouseenter)="onStarHover(star)"
      (mouseleave)="onStarLeave()"
      (click)="onStarClick(star)">
      {{ getStarIcon(star) }}
    </mat-icon>
  </div>

  <div class="rating-label" *ngIf="rating > 0">
    {{ rating }} / 5
  </div>

  <div class="rating-hint" *ngIf="rating >= 4">
    Glad you love BioBrain! You'll be taken to leave a Google Review<span *ngIf="displayName"> as {{ displayName }}</span>.
  </div>

  <mat-form-field class="feedback-field" appearance="outline" *ngIf="rating > 0 && rating < 4">
    <mat-label>Tell us how we can improve</mat-label>
    <textarea
      matInput
      [(ngModel)]="feedback"
      rows="3"
      maxlength="500"
      placeholder="Your feedback helps us improve BioBrain...">
    </textarea>
    <mat-hint>Your feedback will be sent to our support team.</mat-hint>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="center">
  <button
    mat-stroked-button
    type="button"
    class="auto-bordered-form-button"
    color="accent"
    [disabled]="submitting"
    (click)="onMaybeLater()">
    MAYBE LATER
  </button>

  <button
    mat-raised-button
    type="button"
    class="auto-form-button"
    color="primary"
    [disabled]="rating === 0 || submitting"
    (click)="onSubmit()">
    {{ submitting ? 'SUBMITTING...' : 'SUBMIT' }}
  </button>
</mat-dialog-actions>
