<div class="container admin-container">
  <mat-toolbar color="primary" class="toolbar">
    <button mat-icon-button (click)="onBackClick()" *ngIf="isNavigationAvailable | async">
      <mat-icon>arrow_back</mat-icon>
    </button>

    <button class="menu-button" mat-icon-button (click)="sidenav.toggle()" *ngIf="isNavigationAvailable | async">
      <mat-icon>menu</mat-icon>
    </button>

    <a class="hand-pointer" (click)="onHomeClick()">
      <img class="header-icon" src="/assets/images/icon.png" />
    </a>


    <div class="sub-title">
      <span>{{ subTitleProvider.subTitle$ | async }}</span>
    </div>


    <span *ngIf="currentUserService.userChanges$ | async as user">{{user.name}}</span>

    <button mat-icon-button [matMenuTriggerFor]="menu" *ngIf="currentUserService.userChanges$ | async">
      <mat-icon>account_circle</mat-icon>
    </button>

    <mat-menu #menu="matMenu" yPosition="below" [overlapTrigger]="false">
      <button *ngIf="isCouldNavigateToMyClasses | async" mat-menu-item (click)="onMyClasses()" ng>{{strings.myClasses | titlecase}}</button>
      <button mat-menu-item (click)="onChangePassword()">{{strings.changePassword}}</button>
      <button mat-menu-item (click)="onLogoutClick()">{{strings.logout}}</button>
    </mat-menu>

  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav [mode]="'side'" [fixedInViewport]="false" fixedTopGap="56" class="side-nav">
      <mat-nav-list>
        <a
          mat-list-item
          [routerLink]="nav.navigation"
          [queryParams]="nav.queryParams"
          routerLinkActive="active-menu-link"
          *ngFor="let nav of navigationItems">
          {{nav.title | titlecase}}
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <div class="content-container">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>

  </mat-sidenav-container>

  <app-loader></app-loader>
</div>
