<form role="form" #dialogForm="ngForm" name="dialogForm">
  <h2 class="dialog-header" mat-dialog-title>{{strings.teacher | titlecase}}</h2>

  <mat-dialog-content>
    <div fxLayout="column" class="dialog-content">
      <mat-form-field fxFlex="1 1 100%">
        <input
          matInput
          name="firstName"
          [(ngModel)]="data.firstName"
          #firstName="ngModel"
          placeholder="{{strings.firstName | titlecase}}"
          required
          appAutofocus
        >
        <mat-error *ngIf="firstName.hasError('required')">
          {{strings.requiredFieldError | titlecase}}
        </mat-error>
      </mat-form-field>

      <mat-form-field fxFlex="1 1 100%">
        <input
          matInput
          name="lastName"
          [(ngModel)]="data.lastName"
          #lastName="ngModel"
          placeholder="{{strings.lastName | titlecase}}"
          required
        >
        <mat-error *ngIf="lastName.hasError('required')">
          {{strings.requiredFieldError | titlecase}}
        </mat-error>
      </mat-form-field>

      <mat-form-field fxFlex="1 1 100%">
        <input
          matInput
          name="email"
          [(ngModel)]="data.email"
          #email="ngModel"
          placeholder="{{strings.email | titlecase}}"
          required
          [disabled]="data.isEditMode"
          pattern="^[a-zA-Z0-9.\-_]{1,}@([0-9a-zA-Z\-]{1,}[.]{1}){1,}([a-zA-Z]{2,}){1}$"
        >
        <mat-error *ngIf="email.hasError('required')">
          {{strings.requiredFieldError | titlecase}}
        </mat-error>
        <mat-error *ngIf="email.hasError('pattern')">{{strings.invalidEmail}}</mat-error>
      </mat-form-field>
    </div>

  </mat-dialog-content>

  <div mat-dialog-actions fxLayout="row" fxLayoutGap="8px" align="end">
    <div class="flex-separator"></div>

    <button
      mat-stroked-button
      class="auto-bordered-form-button"
      color="accent"
      (click)="onClose()"
      type="button"
    >
      {{strings.cancel | uppercase}}
    </button>

    <button
      mat-raised-button
      class="auto-form-button"
      color="accent"
      (click)="onSubmit(dialogForm)"
      [disabled]="!dialogForm.valid"
      type="submit"
    >
      {{strings.save | uppercase}}
    </button>
  </div>

</form>
