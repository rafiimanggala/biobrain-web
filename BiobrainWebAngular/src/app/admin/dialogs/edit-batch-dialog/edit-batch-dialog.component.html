<form role='form' #dialogForm='ngForm' name='dialogForm'>
  <h2 class='dialog-header' mat-dialog-title>{{ strings.addAccessCodes | titlecase }}</h2>

  <mat-dialog-content>
    <div fxLayout='column' class='dialog-content'>
      <mat-form-field fxFlex='1 1 100%'>
        <input matInput type='text' name='note' placeholder="{{strings.note | titlecase}}"
          [(ngModel)]='batchSettings.note' #note='ngModel' required>
        <mat-error *ngIf="note.hasError('required')">
          {{strings.requiredFieldError | titlecase}}
        </mat-error>
      </mat-form-field>
      <mat-form-field fxFlex='1 1 100%'>
        <input matInput type='number' name='numberOfCodes' placeholder="{{strings.numberOfCodes | titlecase}}"
          [(ngModel)]='batchSettings.numberOfCodes' #numberOfCodes='ngModel' required>
        <mat-error *ngIf="numberOfCodes.hasError('required')">
          {{strings.requiredFieldError | titlecase}}
        </mat-error>
      </mat-form-field>

      <mat-form-field fxFlex="1 1 100%">
        <mat-label>{{strings.expiryDate | titlecase}}</mat-label>
        <input matInput [matDatepicker]="expiryDatePicker" [(ngModel)]='batchSettings.expiryDate' name='expiryDatePicker'
          #expiryDateModel="ngModel" readonly (click)="expiryDatePicker.open()">
        <mat-datepicker-toggle matSuffix [for]="expiryDatePicker"></mat-datepicker-toggle>
        <mat-datepicker #expiryDatePicker disabled="false"></mat-datepicker>

        <mat-error *ngIf="expiryDateModel.errors?.required">{{strings.requiredFieldError}}</mat-error>
      </mat-form-field>

      <div fxLayout="column" fxLayoutGap="10px">
        <div>{{strings.courses}}({{selectedCoursesCount}})</div>
        <div fxLayout="row wrap">
          <mat-checkbox fxFlex="50" *ngFor="let course of dialogData.courses" [(ngModel)]="course.isSelected"
            #courseCheckbox="ngModel" name="courseCheckbox">
            {{course.name}}
          </mat-checkbox>
        </div>
      </div>

    </div>

  </mat-dialog-content>

  <div mat-dialog-actions fxLayout='row' fxLayoutGap='8px' align='end'>
    <div class='flex-separator'></div>

    <button mat-stroked-button type='button' class='auto-bordered-form-button' color='accent' (click)='onClose()'>
      {{strings.cancel | uppercase}}
    </button>

    <button mat-raised-button type='submit' class='auto-form-button' color='accent' (click)='onSubmit(dialogForm)'
      [disabled]='!dialogForm.valid || selectedCoursesCount < 1'>
      {{strings.add | uppercase}}
    </button>
  </div>

</form>
